<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1270" font-family="system-ui, sans-serif">
  <style>
    .box { fill: #fff; stroke: #000; stroke-width: 2; rx: 6; }
    .box-action { fill: #000; stroke: #000; stroke-width: 2; rx: 6; }
    .box-auto { fill: #e8e8e8; stroke: #000; stroke-width: 2; rx: 6; }
    .box-optional { fill: #fff; stroke: #000; stroke-width: 2; rx: 6; stroke-dasharray: 6,4; }
    .label { font-size: 15px; fill: #000; font-weight: 600; }
    .label-white { font-size: 15px; fill: #fff; font-weight: 600; }
    .label-small { font-size: 12px; fill: #666; }
    .title { font-size: 20px; fill: #000; font-weight: 700; }
    .section { font-size: 14px; fill: #000; font-weight: 700; }
    .note { font-size: 12px; fill: #444; font-style: italic; }
    .arrow { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrowhead); }
    .arrow-auto { fill: none; stroke: #666; stroke-width: 2; marker-end: url(#arrowhead-gray); stroke-dasharray: 6,4; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" class="title">SuperTask: Lasso Capture Workflow</text>
  <text x="450" y="55" text-anchor="middle" class="label-small">Solid = user action | Gray fill = automatic | Dashed = optional</text>

  <!-- Step 1: Lasso -->
  <rect x="300" y="80" width="300" height="50" class="box" />
  <text x="450" y="110" text-anchor="middle" class="label">1. Lasso handwriting on note</text>
  <text x="450" y="125" text-anchor="middle" class="label-small">User selects strokes with lasso tool</text>

  <line x1="450" y1="130" x2="450" y2="160" class="arrow" />

  <!-- Step 2: Tap Add Task -->
  <rect x="300" y="160" width="300" height="50" class="box" />
  <text x="450" y="190" text-anchor="middle" class="label">2. Tap "Add Task" (lasso bar)</text>
  <text x="450" y="205" text-anchor="middle" class="label-small">Button 200, opens Quick Add overlay</text>

  <line x1="450" y1="210" x2="450" y2="240" class="arrow" />

  <!-- Step 3: OCR (automatic) -->
  <rect x="300" y="240" width="300" height="50" class="box-auto" />
  <text x="450" y="267" text-anchor="middle" class="label">3. OCR recognition</text>
  <text x="450" y="283" text-anchor="middle" class="label-small">Automatic: recognizeElements()</text>

  <!-- OCR branch: fail -->
  <line x1="600" y1="265" x2="720" y2="265" class="arrow" />
  <rect x="720" y="245" width="140" height="40" class="box" />
  <text x="790" y="268" text-anchor="middle" class="label">Error + Retry</text>

  <line x1="450" y1="290" x2="450" y2="320" class="arrow" />

  <!-- Step 4: Quick Add Form -->
  <rect x="250" y="320" width="400" height="90" class="box" />
  <text x="450" y="345" text-anchor="middle" class="label">4. Quick Add overlay</text>
  <text x="450" y="365" text-anchor="middle" class="label-small">Task title (pre-filled, editable)</text>
  <text x="450" y="380" text-anchor="middle" class="label-small">Priority | Project | Description</text>
  <text x="450" y="395" text-anchor="middle" class="label-small">[ Tasks ] link in header to jump to TaskHome</text>

  <!-- Dismiss branch -->
  <line x1="250" y1="365" x2="130" y2="365" class="arrow" />
  <rect x="30" y="345" width="100" height="40" class="box" />
  <text x="80" y="370" text-anchor="middle" class="label">Close</text>
  <text x="80" y="395" text-anchor="middle" class="label-small">Tap outside / X</text>
  <text x="80" y="410" text-anchor="middle" class="label-small">No marking</text>

  <line x1="450" y1="410" x2="450" y2="445" class="arrow" />

  <!-- Step 5: Submit -->
  <rect x="300" y="445" width="300" height="50" class="box-action" />
  <text x="450" y="475" text-anchor="middle" class="label-white">5. "Add to Todoist"</text>

  <line x1="450" y1="495" x2="450" y2="530" class="arrow" />

  <!-- Step 6: Auto-mark (automatic) -->
  <rect x="250" y="530" width="400" height="75" class="box-auto" />
  <text x="450" y="552" text-anchor="middle" class="label">6. Auto-mark handwriting</text>
  <text x="450" y="569" text-anchor="middle" class="label-small">Automatic: lassoElements(bounds) + setLassoStrokeLink(style: 2)</text>
  <text x="450" y="584" text-anchor="middle" class="label-small">Dashed border appears on original handwriting</text>
  <text x="450" y="599" text-anchor="middle" class="label-small">Link dest from config: Todoist task URL or self-ref note (mark only)</text>

  <line x1="450" y1="605" x2="450" y2="640" class="arrow" />

  <!-- Step 7: Success screen -->
  <rect x="250" y="640" width="400" height="95" class="box" />
  <text x="450" y="665" text-anchor="middle" class="label">7. "Task added!"</text>
  <text x="450" y="685" text-anchor="middle" class="label-small">Handwriting is marked (dashed border visible on note)</text>
  <text x="450" y="700" text-anchor="middle" class="label-small">Lasso selection active on marked handwriting</text>
  <text x="450" y="715" text-anchor="middle" class="label-small">Shows: [ Convert to Text ] | [ View Tasks ] | [ Done ]</text>

  <!-- Branch A: Convert to Text -->
  <line x1="350" y1="735" x2="350" y2="780" class="arrow" />

  <rect x="200" y="780" width="300" height="110" class="box-optional" />
  <text x="350" y="805" text-anchor="middle" class="label">A. "Convert to Text" (optional)</text>
  <text x="350" y="823" text-anchor="middle" class="label-small">insertText() at bounds position</text>
  <text x="350" y="838" text-anchor="middle" class="label-small">replaceElements() removes handwriting</text>
  <text x="350" y="853" text-anchor="middle" class="label-small">Re-lasso + setLassoStrokeLink on typed text</text>
  <text x="350" y="868" text-anchor="middle" class="label-small">Link dest from config (same as auto-mark)</text>
  <text x="350" y="883" text-anchor="middle" class="label-small">Lasso selection active on typed text for repositioning</text>

  <!-- Branch B: View Tasks -->
  <line x1="550" y1="735" x2="550" y2="780" class="arrow" />

  <rect x="500" y="780" width="140" height="40" class="box" />
  <text x="570" y="805" text-anchor="middle" class="label">B. View Tasks</text>
  <text x="570" y="830" text-anchor="middle" class="label-small">Opens full TaskHome</text>

  <!-- Branch C: Done -->
  <line x1="700" y1="690" x2="780" y2="690" class="arrow" />
  <rect x="780" y="670" width="100" height="40" class="box-action" />
  <text x="830" y="695" text-anchor="middle" class="label-white">C. Done</text>
  <text x="830" y="720" text-anchor="middle" class="label-small">closePluginView()</text>

  <!-- Config note -->
  <line x1="0" y1="930" x2="900" y2="930" stroke="#ccc" stroke-width="1" />
  <text x="450" y="955" text-anchor="middle" class="section">Config: "Link to Todoist Task" toggle</text>
  <rect x="100" y="970" width="310" height="55" class="box-auto" />
  <text x="255" y="990" text-anchor="middle" class="label">ON: link opens Todoist task</text>
  <text x="255" y="1010" text-anchor="middle" class="label-small">destPath = task URL, linkType = 4 (URL)</text>
  <text x="255" y="1020" text-anchor="middle" class="label-small">Tapping dashed border opens browser</text>
  <rect x="490" y="970" width="310" height="55" class="box" />
  <text x="645" y="990" text-anchor="middle" class="label">OFF: visual mark only (default)</text>
  <text x="645" y="1010" text-anchor="middle" class="label-small">destPath = note file, linkType = 0 (note)</text>
  <text x="645" y="1020" text-anchor="middle" class="label-small">Tapping dashed border is a no-op</text>

  <!-- Results section -->
  <line x1="0" y1="1050" x2="900" y2="1050" stroke="#ccc" stroke-width="1" />
  <text x="450" y="1080" text-anchor="middle" class="section">Result variants (what the note page looks like)</text>

  <!-- Result 1 -->
  <rect x="30" y="1100" width="250" height="70" class="box" />
  <text x="155" y="1122" text-anchor="middle" class="label">Dismissed / No submit</text>
  <text x="155" y="1142" text-anchor="middle" class="label-small">Handwriting unchanged</text>
  <text x="155" y="1157" text-anchor="middle" class="label-small">No task created, no marking</text>

  <!-- Result 2 -->
  <rect x="320" y="1100" width="250" height="85" class="box-auto" />
  <text x="445" y="1122" text-anchor="middle" class="label">Submitted (default)</text>
  <text x="445" y="1142" text-anchor="middle" class="label-small">Original handwriting with</text>
  <text x="445" y="1157" text-anchor="middle" class="label-small">dashed border + link icon</text>
  <text x="445" y="1172" text-anchor="middle" class="label-small">Lasso active for repositioning</text>

  <!-- Result 3 -->
  <rect x="610" y="1100" width="260" height="85" class="box-optional" />
  <text x="740" y="1122" text-anchor="middle" class="label">Submitted + Convert to Text</text>
  <text x="740" y="1142" text-anchor="middle" class="label-small">Typed text replaces handwriting</text>
  <text x="740" y="1157" text-anchor="middle" class="label-small">dashed border + link icon</text>
  <text x="740" y="1172" text-anchor="middle" class="label-small">Lasso active for repositioning</text>

  <!-- Legend -->
  <rect x="30" y="1220" width="20" height="14" class="box" />
  <text x="58" y="1232" class="label-small">User action</text>
  <rect x="170" y="1220" width="20" height="14" class="box-auto" />
  <text x="198" y="1232" class="label-small">Automatic</text>
  <rect x="300" y="1220" width="20" height="14" class="box-optional" />
  <text x="328" y="1232" class="label-small">Optional</text>
  <rect x="430" y="1220" width="20" height="14" class="box-action" />
  <text x="458" y="1232" class="label-small">Primary action</text>
</svg>
