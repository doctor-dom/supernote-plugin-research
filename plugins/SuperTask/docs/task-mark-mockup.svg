<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Note page background -->
  <rect width="600" height="400" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Simulated handwriting lines (unmarked) -->
  <text x="40" y="50" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">Meeting notes from Tuesday</text>
  <text x="40" y="85" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">- reviewed Q3 budget</text>

  <!-- Captured task area - dotted border -->
  <rect x="30" y="108" width="400" height="38" rx="3" ry="3"
        fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- T marker - top left of the border -->
  <rect x="12" y="110" width="18" height="18" rx="2" ry="2" fill="#000"/>
  <text x="16" y="124" font-family="monospace" font-size="13" fill="white" font-weight="bold">T</text>

  <!-- The captured handwriting (inside dotted border) -->
  <text x="40" y="132" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">Follow up with Jamie on proposal</text>

  <!-- More unmarked content below -->
  <text x="40" y="175" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">- need final numbers by Friday</text>

  <!-- Second captured task -->
  <rect x="30" y="195" width="360" height="38" rx="3" ry="3"
        fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="12" y="197" width="18" height="18" rx="2" ry="2" fill="#000"/>
  <text x="16" y="211" font-family="monospace" font-size="13" fill="white" font-weight="bold">T</text>

  <text x="40" y="219" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">Send updated deck to Sarah</text>

  <!-- More content -->
  <text x="40" y="262" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">- discussed timeline for launch</text>
  <text x="40" y="297" font-family="'Segoe Script', 'Bradley Hand', cursive" font-size="18" fill="#222">- marketing wants 2 week buffer</text>

  <!-- Legend -->
  <line x1="30" y1="340" x2="570" y2="340" stroke="#ddd" stroke-width="1"/>
  <rect x="30" y="355" width="16" height="16" rx="2" ry="2" fill="#000"/>
  <text x="32.5" y="367" font-family="monospace" font-size="11" fill="white" font-weight="bold">T</text>
  <text x="54" y="368" font-family="sans-serif" font-size="13" fill="#666">= Captured as task in SuperTask (dotted border marks the source text)</text>
</svg>
